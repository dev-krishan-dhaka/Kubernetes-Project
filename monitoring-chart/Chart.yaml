apiVersion: v2
name: monitoring-stack
description: Prometheus + Loki + Grafana Monitoring Stack
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: kube-prometheus-stack
    version: "58.2.2"
    repository: https://prometheus-community.github.io/helm-charts
    alias: prometheus

  - name: loki-stack
    version: "2.10.2"
    repository: https://grafana.github.io/helm-charts
    alias: loki

  - name: grafana
    version: "7.3.9"
    repository: https://grafana.github.io/helm-charts
    alias: grafana

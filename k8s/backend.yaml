apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: user-management

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: devkrishan001/backend:v1

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          value: postgres-service

        - name: DB_PORT
          value: "5432"

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_DB

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: JWT_SECRET

        - name: PORT
          value: "5000"

---
apiVersion: v1
kind: Service

metadata:
  name: backend-service
  namespace: user-management

spec:
  selector:
    app: backend

  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30081

  type: NodePort
